<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stripe Shop | Secure Checkout</title>
    <meta
      name="description"
      content="Stripe Hosted Checkout を利用した安全なオンライン決済ページです。"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-glow bg-glow-a" aria-hidden="true"></div>
    <div class="bg-glow bg-glow-b" aria-hidden="true"></div>

    <header class="hero container">
      <p class="eyebrow">Secure by Stripe</p>
      <h1>本番決済対応のミニショップ</h1>
      <p class="lead">
        カード情報は Stripe の決済画面で安全に処理されます。このサイトは GitHub
        Pages 上で公開できる静的構成です。
      </p>
      <a class="hero-link" href="#products">商品を見る</a>
    </header>

    <main class="container">
      <section id="products" class="products-section">
        <div class="section-heading">
          <h2>Products</h2>
          <p>購入ボタンを押すと Stripe Hosted Checkout に遷移します。</p>
        </div>
        <div id="product-grid" class="product-grid" aria-live="polite"></div>
      </section>

      <section class="info-card">
        <h3>運用メモ</h3>
        <ul>
          <li>価格や商品追加は Stripe Dashboard 側で管理可能</li>
          <li>Live mode の Payment Link を設定すると実課金されます</li>
          <li>このサイトに秘密鍵は不要です</li>
        </ul>
      </section>
    </main>

    <footer class="container footer">
      <small>© 2026 Stripe Practice</small>
    </footer>

    <script src="app.js" defer></script>
  </body>
</html>
